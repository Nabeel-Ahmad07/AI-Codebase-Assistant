<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Codebase Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .chat-box { height: 450px; overflow-y: auto; background: white; border: 1px solid #dee2e6; border-radius: 0.375rem; padding: 1rem; }
        .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 0.5rem; max-width: 85%; }
        .user-msg { background-color: #0d6efd; color: white; margin-left: auto; }
        .bot-msg { background-color: #e9ecef; color: #212529; margin-right: auto; }
        .citation { font-size: 0.825rem; background: #fff3cd; color: #664d03; border: 1px solid #ffe69c; border-radius: 4px; display: inline-block; padding: 2px 6px; margin-top: 5px; cursor: pointer; }
        .code-snippet { font-family: monospace; font-size: 0.85rem; background: #212529; color: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 8px; white-space: pre-wrap; }
        .explanation-text { font-size: 0.95rem; line-height: 1.5; color: #212529; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 900px;">
    <header class="text-center mb-5">
        <h1 class="display-6 fw-bold text-dark">AI Codebase Assistant</h1>
        <p class="text-muted">Upload a public GitHub repository link to analyze and query code structures natively.</p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white fw-semibold">1. Connect Codebase Base</div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="repoUrl" class="form-control" placeholder="https://github.com/username/repository">
                <button class="btn btn-primary" id="btnIndex" onclick="processRepository()">Index Codebase</button>
            </div>
            <div id="ingestStatus" class="form-text mt-2 text-secondary"></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white fw-semibold">2. Interact with Repository Context</div>
        <div class="card-body">
            <div id="chatBox" class="chat-box mb-3">
                <div class="message bot-msg">Hello! Index a repository above, then ask me structural architectural questions about its workflow layers.</div>
            </div>
            <div class="input-group">
                <input type="text" id="userInput" class="form-control" placeholder="e.g., Explain the main entry point or search configurations..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-success" id="btnSend" onclick="sendMessage()">Ask Assistant</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "http://127.0.0.1:8000";

    async function processRepository() {
        const repoUrl = document.getElementById("repoUrl").value.trim();
        const statusDiv = document.getElementById("ingestStatus");
        const indexBtn = document.getElementById("btnIndex");

        if (!repoUrl) {
            alert("Please enter a valid GitHub Repository link.");
            return;
        }

        statusDiv.className = "form-text mt-2 text-warning fw-medium";
        statusDiv.innerText = "Cloning repository, scanning syntax matrices, and upserting vectors locally...";
        indexBtn.disabled = true;

        try {
            const response = await fetch(`${BACKEND_URL}/api/repository/process`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: repoUrl })
            });
            const data = await response.json();

            if (response.ok && data.success) {
                statusDiv.className = "form-text mt-2 text-success fw-medium";
                statusDiv.innerText = data.message;
            } else {
                statusDiv.className = "form-text mt-2 text-danger fw-medium";
                statusDiv.innerText = `Error: ${data.detail || "Failed to parse codebase."}`;
            }
        } catch (err) {
            statusDiv.className = "form-text mt-2 text-danger fw-medium";
            statusDiv.innerText = "Could not connect to FastAPI server. Ensure backend is running locally.";
            console.error(err);
        } finally {
            indexBtn.disabled = false;
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const query = inputField.value.trim();
        const chatBox = document.getElementById("chatBox");

        if (!query) return;

        appendMessage(query, "user-msg");
        inputField.value = "";

        const loadingId = appendMessage("Thinking and analyzing codebase context...", "bot-msg");

        try {
            const response = await fetch(`${BACKEND_URL}/api/chat/placeholder`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: query })
            });
            const data = await response.json();
            
            document.getElementById(loadingId).remove();

            let htmlResponse = "";

            if (data.final_answer) {
                const formattedAnswer = parseSimpleMarkdown(data.final_answer);
                htmlResponse += `<div class="explanation-text">${formattedAnswer}</div>`;
            }

            if (data.matched_code_snippets && data.matched_code_snippets.length > 0) {
                htmlResponse += `<hr><small class="text-muted d-block mb-2"><strong>Retrieved Code Context Handles:</strong></small>`;
                
                data.matched_code_snippets.forEach(chunk => {
                    htmlResponse += `
                        <div class="mt-2 mb-3">
                            <span class="citation">📍 ${chunk.metadata.file_path} (Lines ${chunk.metadata.start_line}-${chunk.metadata.end_line})</span>
                            <pre class="code-snippet"><code>${escapeHtml(chunk.content)}</code></pre>
                        </div>`;
                });
                appendMessageHtml(htmlResponse, "bot-msg");
            } else if (data.final_answer) {
                appendMessageHtml(htmlResponse, "bot-msg");
            } else {
                appendMessageHtml("No overlapping similarity structures matched inside the current vector database collection.", "bot-msg");
            }
        } catch (err) {
            if (document.getElementById(loadingId)) {
                document.getElementById(loadingId).remove();
            }
            appendMessage("Failed to execute agent workflow response cycle.", "bot-msg");
            console.error(err);
        }
    }

    function appendMessage(text, className) {
        const id = "msg_" + Math.random().toString(36).substr(2, 9);
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.id = id;
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    function appendMessageHtml(html, className) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerHTML = html;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function escapeHtml(string) {
        return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function parseSimpleMarkdown(text) {
    return text
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:#f1f3f5; padding:2px 4px; border-radius:3px; font-family:monospace; color:#d63384;">$1</code>');
    }
</script>
</body>
</html>
